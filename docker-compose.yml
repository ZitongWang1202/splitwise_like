services:

  db:
    image: postgres:16
    container_name: splitwise_db
    restart: always

    env_file:
      - backend/.env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U postgres -d expense_manager"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: splitwise_backend
    restart: always

    env_file:
      - backend/.env

    environment:
      DATABASE_URL: postgresql://postgres:password@db:5432/expense_manager
      CORS_ORIGINS: http://localhost:5173
      
    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy

    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-f",
          "http://localhost:8000/health"
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

    command: >
      sh -c "alembic upgrade head &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build: ./frontend
    container_name: splitwise_frontend
    restart: always

    ports:
      - "5173:80"

    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data: