services:

  db:

    image: postgres:16

    container_name: splitwise_db

    restart: always

    env_file:
      - .env

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  backend:

    build: .

    container_name: splitwise_backend

    restart: always

    env_file:
      - .env

    ports:
      - "8000:8000"

    depends_on:
      - db


volumes:
  postgres_data: